[tools]
ruby = "3.4.9"

[settings]
env_file = ".env"

[settings.ruby]
compile = false

[tasks.deploy]
description = "Kamal で本番へデプロイ"
run = "bundle exec kamal deploy"

[tasks.up]
description = "docker compose でコンテナを起動"
run = "docker compose up -d"

[tasks.stop]
description = "docker compose でコンテナを停止"
run = "docker compose stop"

[tasks.restart]
description = "docker compose でコンテナを再起動"
run = "docker compose restart"
